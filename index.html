<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Pay | White Belt Challenge</title>
    <!-- Modern Styling -->
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for professional typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Header Section -->
        <header>
            <h1 class="gradient-text">Stellar Pay</h1>
            <p class="subtitle">Secure Testnet Payments made simple</p>
        </header>

        <!-- Wallet Section -->
        <section id="wallet-section" class="card">
            <div id="connection-prompt" class="centered-content">
                <p>Connect your Freighter wallet to access the Stellar Testnet.</p>
                <button id="connect-btn" class="btn btn-primary">Connect Wallet</button>
            </div>

            <div id="wallet-info" class="hidden">
                <div class="info-row">
                    <span class="label">Public Address</span>
                    <span id="wallet-address" class="value">Not connected</span>
                </div>
                <div class="info-row status-connected">
                    <span class="indicator"></span> Connected to Testnet
                </div>
                <button id="disconnect-btn" class="btn btn-outline small-btn">Disconnect Wallet</button>
            </div>
        </section>

        <!-- Balance Section -->
        <section id="balance-section" class="card hidden">
            <h3>Account Balance</h3>
            <div class="balance-display">
                <span id="wallet-balance" class="xlm-value">0.00</span>
                <span class="currency">XLM</span>
            </div>
            <p class="testnet-note">Funds on <strong>Stellar Testnet</strong></p>
        </section>

        <!-- Transaction Section -->
        <section id="payment-section" class="card hidden">
            <h3>Send XLM</h3>
            <form id="payment-form">
                <div class="input-group">
                    <label for="receiver">Receiver Address</label>
                    <input type="text" id="receiver" placeholder="G..." spellcheck="false" required>
                </div>
                <div class="input-group">
                    <label for="amount">Amount (XLM)</label>
                    <input type="number" id="amount" step="0.0000001" min="0.0000001" placeholder="0.0" required>
                </div>
                <button type="submit" id="send-btn" class="btn btn-primary full-width">Send XLM</button>
            </form>
        </section>

        <!-- Feedback & Results Section -->
        <div id="status-box" class="status-message hidden">
            <div id="status-content"></div>
        </div>

        <footer>
            <p>Built for the Stellar White Belt Challenge</p>
        </footer>
    </div>

    <!-- Main Logic -->
    <script type="module" src="app.js"></script>
</body>

</html>
